name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: accli-linux
            binary_name: accli
          - os: windows-latest
            artifact_name: accli-windows
            binary_name: accli.exe
          - os: macos-latest
            artifact_name: accli-macos
            binary_name: accli

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        if: matrix.os == 'ubuntu-latest'
        uses: goto-bus-stop/setup-zig@v2
        with:
          zig-version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.os == 'ubuntu-latest'
        run: pip install cargo-zigbuild

      - name: Build Wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Download PyApp
        shell: bash
        run: |
          curl -sSL https://github.com/ofek/pyapp/releases/latest/download/source.tar.gz -o pyapp-source.tar.gz
          mkdir pyapp-latest
          tar -xzf pyapp-source.tar.gz -C pyapp-latest --strip-components=1

      - name: Build Binaries (CLI and GUI)
        shell: bash
        run: |
          WHEEL_PATH=$(ls dist/*.whl | head -n 1)
          ABS_WHEEL_PATH=$(realpath "$WHEEL_PATH")
          VERSION=$(grep 'VERSION =' accli/_version.py | cut -d'"' -f2 | sed 's/^v//')
          
          # Determine GUI binary name
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            GUI_NAME="accli-gui-linux"
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            GUI_NAME="accli-gui-windows.exe"
          else
            GUI_NAME="accli-gui-macos"
          fi
          
          # 1. Build CLI binary
          cd pyapp-latest
          export PYAPP_PROJECT_NAME="accli"
          export PYAPP_PROJECT_VERSION="$VERSION"
          export PYAPP_PROJECT_PATH="$ABS_WHEEL_PATH"
          export PYAPP_FULL_ISOLATION=1
          export PYAPP_DISTRIBUTION_EMBED=1
          
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17
            BINARY_SOURCE="target/x86_64-unknown-linux-gnu/release/pyapp"
          else
            cargo build --release
            BINARY_SOURCE="target/release/pyapp${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          fi
          
          mkdir -p ../dist/binaries
          cp "$BINARY_SOURCE" ../dist/binaries/${{ matrix.artifact_name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          
          # Clean build target to ensure a clean rebuild with the new execution spec
          cargo clean
          
          # 2. Build GUI binary
          export PYAPP_EXEC_SPEC="accli.gui:main"
          
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17
            BINARY_SOURCE="target/x86_64-unknown-linux-gnu/release/pyapp"
          else
            cargo build --release
            BINARY_SOURCE="target/release/pyapp${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          fi
          
          cp "$BINARY_SOURCE" ../dist/binaries/"$GUI_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/binaries/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/binaries

      - name: Sign the binaries with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            dist/binaries/accli-linux/accli-linux
            dist/binaries/accli-linux/accli-gui-linux
            dist/binaries/accli-windows/accli-windows.exe
            dist/binaries/accli-windows/accli-gui-windows.exe
            dist/binaries/accli-macos/accli-macos
            dist/binaries/accli-macos/accli-gui-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/binaries/accli-linux/accli-linux
            dist/binaries/accli-linux/accli-gui-linux
            dist/binaries/accli-linux/accli-linux.sig
            dist/binaries/accli-linux/accli-linux.crt
            dist/binaries/accli-linux/accli-gui-linux.sig
            dist/binaries/accli-linux/accli-gui-linux.crt
            dist/binaries/accli-windows/accli-windows.exe
            dist/binaries/accli-windows/accli-gui-windows.exe
            dist/binaries/accli-windows/accli-windows.exe.sig
            dist/binaries/accli-windows/accli-windows.exe.crt
            dist/binaries/accli-windows/accli-gui-windows.exe.sig
            dist/binaries/accli-windows/accli-gui-windows.exe.crt
            dist/binaries/accli-macos/accli-macos
            dist/binaries/accli-macos/accli-gui-macos
            dist/binaries/accli-macos/accli-macos.sig
            dist/binaries/accli-macos/accli-macos.crt
            dist/binaries/accli-macos/accli-gui-macos.sig
            dist/binaries/accli-macos/accli-gui-macos.crt
          generate_release_notes: true
